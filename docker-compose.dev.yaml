services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-angaza}
      POSTGRES_USER: ${POSTGRES_USER:-angaza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
